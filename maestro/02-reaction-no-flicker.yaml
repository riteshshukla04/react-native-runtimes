appId: com.nativecomposechat
name: Adding Reaction Does Not Replace Row With Skeleton
tags:
  - reaction
  - no-flicker
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "chat-row-0-v1"
- assertNotVisible: "chat-row-0-skeleton"
- takeScreenshot:
    path: reaction-no-flicker-before

- tapOn:
    id: action-react-latest
- takeScreenshot:
    path: reaction-no-flicker-immediate
- assertVisible:
    text: "chat-row-0-v(1|2)"
- assertNotVisible: "chat-row-0-skeleton"
- assertVisible: "chat-reaction-0-like-1"

- takeScreenshot:
    path: reaction-no-flicker-settled
