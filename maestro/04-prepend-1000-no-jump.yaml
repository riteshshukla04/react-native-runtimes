appId: com.nativecomposechat
name: Prepend 1000 Messages Without Jumping
tags:
  - benchmark
  - prepend
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-prepend-1000
- waitForAnimationToEnd
- assertVisible: "11,000 messages / v2 / idle"
- assertVisible: "chat-row-1000-v1"
- assertNotVisible: "chat-row-0-v2"
- takeScreenshot:
    path: prepend-1000-main-no-jump

- tapOn:
    id: tab-second-rn
- assertVisible: "Native LazyColumn + 2nd RN JSX"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-prepend-1000
- waitForAnimationToEnd
- assertVisible: "11,000 messages / v2 / idle"
- assertVisible: "chat-row-1000-v1"
- assertNotVisible: "chat-row-0-v2"
- takeScreenshot:
    path: prepend-1000-second-no-jump
