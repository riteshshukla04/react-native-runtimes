appId: com.nativecomposechat
name: Message Rows Do Not Overlap
tags:
  - benchmark
  - scroll
  - spacing
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "chat-row-0-v1"
- extendedWaitUntil:
    visible:
      text: "visible-list-spacing-ok.*"
    timeout: 5000
- takeScreenshot:
    path: spacing-geometry-main-start

- repeat:
    times: 10
    commands:
      - swipe:
          start: "50%,80%"
          end: "50%,35%"
          duration: 160
      - waitForAnimationToEnd
      - assertVisible:
          text: "chat-row-[0-9]+-v1"
      - assertVisible:
          text: "visible-list-spacing-ok.*"
      - assertNotVisible:
          text: "visible-list-spacing-overlap"
      - assertNotVisible:
          text: "visible-list-spacing-gap-mismatch"
- takeScreenshot:
    path: spacing-geometry-main-after-scrolls

- tapOn:
    id: tab-second-rn
- assertVisible: "Native LazyColumn + 2nd RN JSX"
- assertVisible: "chat-row-0-v1"
- extendedWaitUntil:
    visible:
      text: "visible-list-spacing-ok.*"
    timeout: 5000
- takeScreenshot:
    path: spacing-geometry-second-start

- repeat:
    times: 10
    commands:
      - swipe:
          start: "50%,80%"
          end: "50%,35%"
          duration: 160
      - waitForAnimationToEnd
      - assertVisible:
          text: "chat-row-[0-9]+-v1"
      - assertVisible:
          text: "visible-list-spacing-ok.*"
      - assertNotVisible:
          text: "visible-list-spacing-overlap"
      - assertNotVisible:
          text: "visible-list-spacing-gap-mismatch"
- takeScreenshot:
    path: spacing-geometry-second-after-scrolls

- tapOn:
    id: tab-rn-ease
- assertVisible: "RN FlatList + react-native-ease"
- assertVisible: "rn-ease-chat-row-0-v1"
- extendedWaitUntil:
    visible:
      text: "visible-list-spacing-ok.*"
    timeout: 5000
- takeScreenshot:
    path: spacing-geometry-rn-ease-start

- repeat:
    times: 10
    commands:
      - swipe:
          start: "50%,80%"
          end: "50%,35%"
          duration: 160
      - waitForAnimationToEnd
      - assertVisible:
          text: "rn-ease-chat-row-[0-9]+-v1"
      - assertVisible:
          text: "visible-list-spacing-ok.*"
      - assertNotVisible:
          text: "visible-list-spacing-overlap"
      - assertNotVisible:
          text: "visible-list-spacing-gap-mismatch"
- takeScreenshot:
    path: spacing-geometry-rn-ease-after-scrolls
