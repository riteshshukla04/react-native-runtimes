appId: com.nativecomposechat
name: Reset Item Command Re-renders By Index
tags:
  - benchmark
  - command
  - reset
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-reset-item-0
- waitForAnimationToEnd
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v2"
- assertNotVisible: "chat-row-0-skeleton"
- takeScreenshot:
    path: reset-item-main-rerender

- tapOn:
    id: tab-second-rn
- assertVisible: "Native LazyColumn + 2nd RN JSX"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-reset-item-0
- waitForAnimationToEnd
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v2"
- assertNotVisible: "chat-row-0-skeleton"
- takeScreenshot:
    path: reset-item-second-rerender
