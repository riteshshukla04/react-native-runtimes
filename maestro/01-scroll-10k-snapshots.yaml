appId: com.nativecomposechat
name: Scroll 10k Messages And Capture Snapshots
tags:
  - benchmark
  - scroll
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- takeScreenshot:
    path: scroll-10k-main-start

- repeat:
    times: 4
    commands:
      - swipe:
          start: "50%,85%"
          end: "50%,20%"
          duration: 110
- takeScreenshot:
    path: scroll-10k-main-after-burst-1

- repeat:
    times: 4
    commands:
      - swipe:
          start: "50%,85%"
          end: "50%,20%"
          duration: 110
- takeScreenshot:
    path: scroll-10k-main-after-burst-2

- tapOn:
    id: tab-second-rn
- assertVisible: "Native LazyColumn + 2nd RN JSX"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- takeScreenshot:
    path: scroll-10k-second-start

- repeat:
    times: 4
    commands:
      - swipe:
          start: "50%,85%"
          end: "50%,20%"
          duration: 110
- takeScreenshot:
    path: scroll-10k-second-after-burst-1

- repeat:
    times: 4
    commands:
      - swipe:
          start: "50%,85%"
          end: "50%,20%"
          duration: 110
- takeScreenshot:
    path: scroll-10k-second-after-burst-2
