appId: com.nativecomposechat
name: Scroll To Item Command
tags:
  - benchmark
  - command
---
- launchApp:
    clearState: true
- assertVisible: "Native LazyColumn + JSX Cells"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-scroll-to-7500
- waitForAnimationToEnd
- assertVisible: "chat-row-7500-v1"
- assertNotVisible: "chat-row-0-v1"
- takeScreenshot:
    path: scroll-to-item-main-7500

- tapOn:
    id: tab-second-rn
- assertVisible: "Native LazyColumn + 2nd RN JSX"
- assertVisible: "10,000 messages / v1 / idle"
- assertVisible: "chat-row-0-v1"
- tapOn:
    id: action-scroll-to-7500
- waitForAnimationToEnd
- assertVisible: "chat-row-7500-v1"
- assertNotVisible: "chat-row-0-v1"
- takeScreenshot:
    path: scroll-to-item-second-7500
