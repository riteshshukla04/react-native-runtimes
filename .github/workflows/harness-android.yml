name: Harness Android

permissions:
  contents: read

concurrency:
  group: harness-android-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

on:
  workflow_dispatch:
    inputs:
      device_api_level:
        description: 'Android API level for the emulator'
        required: false
        default: '36'
        type: string
      device_profile:
        description: 'Device profile'
        required: false
        default: 'pixel_7'
        type: string
      avd_name:
        description: 'AVD name'
        required: false
        default: 'Pixel_7_API_36'
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/workflows/harness-android.yml'
      - 'example/android/**'
      - 'example/__tests__/**'
      - 'example/src/**'
      - 'example/App.tsx'
      - 'example/index.js'
      - 'example/index.business-runtime.ts'
      - 'example/jest.harness.config.mjs'
      - 'example/rn-harness.config.mjs'
      - 'example/metro.config.js'
      - 'example/babel.config.js'
      - 'example/package.json'
      - 'packages/*/cpp/**'
      - 'packages/*/android/**'
      - 'packages/*/src/**'
      - 'packages/*/nitrogen/generated/shared/**'
      - 'packages/*/nitrogen/generated/android/**'
      - 'packages/*/package.json'
      - 'bun.lock'
      - '**/react-native.config.js'
      - '**/nitro.json'
  pull_request:
    paths:
      - '.github/workflows/harness-android.yml'
      - 'example/android/**'
      - 'example/__tests__/**'
      - 'example/src/**'
      - 'example/App.tsx'
      - 'example/index.js'
      - 'example/index.business-runtime.ts'
      - 'example/jest.harness.config.mjs'
      - 'example/rn-harness.config.mjs'
      - 'example/metro.config.js'
      - 'example/babel.config.js'
      - 'example/package.json'
      - 'packages/*/cpp/**'
      - 'packages/*/android/**'
      - 'packages/*/src/**'
      - 'packages/*/nitrogen/generated/shared/**'
      - 'packages/*/nitrogen/generated/android/**'
      - 'packages/*/package.json'
      - 'bun.lock'
      - '**/react-native.config.js'
      - '**/nitro.json'

env:
  # Device configuration - can be overridden by workflow_dispatch inputs.
  # These are read by example/rn-harness.config.mjs.
  DEVICE_API_LEVEL: ${{ github.event.inputs.device_api_level || '36' }}
  DEVICE_ARCH: x86_64
  DEVICE_PROFILE: ${{ github.event.inputs.device_profile || 'pixel_7' }}
  AVD_NAME: ${{ github.event.inputs.avd_name || 'Pixel_7_API_36' }}
  AVD_DISK_SIZE: 1G
  AVD_HEAP_SIZE: 1G
  HARNESS_DEBUG: 1

jobs:
  harness_android:
    name: Harness Tests Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Reclaim disk space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies (bun)
        run: bun install

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17
          java-package: jdk

      - name: Restore Gradle/CMake cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            example/android/.gradle
            example/android/app/.cxx
          key: ${{ runner.os }}-gradle-${{ env.DEVICE_ARCH }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.DEVICE_ARCH }}-
            ${{ runner.os }}-gradle-
      - name: Build Android app
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=${{ env.DEVICE_ARCH }}

      - name: Run Harness E2E tests
        uses: callstackincubator/react-native-harness@v1.2.0
        with:
          runner: android
          projectRoot: example
          app: android/app/build/outputs/apk/debug/app-debug.apk
          packageManager: bun

      # Gradle cache doesn't like daemons
      - name: Stop Gradle Daemon
        working-directory: example/android
        run: ./gradlew --stop
